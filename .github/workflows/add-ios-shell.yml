name: Generate iOS shell

permissions:
  contents: write            # allow this job to push the new ios/ folder

on:
  workflow_dispatch:         # run manually when needed

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ios-main

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ──────────────────────────────────────────────────────────────
      # Install project deps even if lock-file and package.json differ
      # and ensure Capacitor CLI is available in the runner.
      # ──────────────────────────────────────────────────────────────
      - name: Install deps & Capacitor CLI
        run: |
          npm install --legacy-peer-deps
          npx --yes --package @capacitor/cli@latest cap --version

      - name: Add iOS platform
        run: npx --yes @capacitor/cli add ios

      - name: Commit native shell
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ios
          git commit -m "Add native iOS shell" || echo "No changes"
          git push
