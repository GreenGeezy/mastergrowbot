workflows:
  ios-capacitor-build:
    name: iOS Capacitor Build
    max_build_duration: 120         # minutes
    instance_type: mac_mini_m2

    environment:
      groups:                       # pulls keys from Codemagic
        - supabase                  # ← your variable group
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME:   "App"
      xcode: latest                 # latest Apple toolchain

    scripts:
      - name: Install npm dependencies
        script: |
          npm install --legacy-peer-deps

      - name: Build web app
        script: |
          npm run build
          npx next export || true   # safe even if you don’t export

      - name: Sync Capacitor for iOS
        script: |
          npx cap sync ios

      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install

      - name: Build unsigned iOS app
        script: |
          cd ios
          xcodebuild archive \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE=""
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build \
            -exportOptionsPlist ../export_options.plist

    artifacts:
      - ios/build/*.ipa
      - ios/build/App.xcarchive
      - ios/build/Logs
      - ios/build/**/*.app
      - ios/build/**/*.dSYM

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'ios-main'
          include: true
