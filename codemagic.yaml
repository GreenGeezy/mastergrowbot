workflows:
  ios-capacitor-build:
    name: iOS Capacitor Build
    max_build_duration: 120            # minutes
    instance_type: mac_mini_m2

    environment:
      groups:                          # pulls secrets/keys from Codemagic
        - supabase                     # ← the group you created
      vars:
        # ‼️ We change only the workspace path — it must be *relative*
        #   to the ios/ directory because we `cd ios` before building.
        XCODE_WORKSPACE: "App/App.xcworkspace"
        XCODE_SCHEME:    "App"
      xcode: latest                    # latest Apple tool-chain

    scripts:
      # 1. Install JS deps
      - name: Install npm dependencies
        script: |
          npm install --legacy-peer-deps

      # 2. Build your Vite / Next.js site (and export if you use SSG)
      - name: Build web app
        script: |
          npm run build
          npx next export || true      # harmless if not exporting

      # 3. Sync Capacitor
      - name: Sync Capacitor for iOS
        script: |
          npx cap sync ios

      # 4. Install CocoaPods
      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install
          cd ..

      # 5. Build an **unsigned** .xcarchive + .ipa
      - name: Build unsigned iOS app
        script: |
          cd ios
          xcodebuild archive \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE=""
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build \
            -exportOptionsPlist ../export_options.plist
          cd ..

    artifacts:
      - ios/build/*.ipa
      - ios/build/App.xcarchive
      - ios/build/Logs
      - ios/build/**/*.app
      - ios/build/**/*.dSYM

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "ios-main"
          include: true
